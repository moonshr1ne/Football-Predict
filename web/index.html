<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>National Football Predictor</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="shell">
      <section class="panel controls">
        <div>
          <h1>Прогноз сборных</h1>
          <p class="muted">Введите две команды через запятую.</p>
        </div>
        <form id="predict-form" class="row">
          <input id="matchup" name="matchup" value="Уругвай, Испания" autocomplete="off">
          <label class="check"><input id="home-venue" type="checkbox"> первая дома</label>
          <button type="submit">Прогноз</button>
        </form>
      </section>

      <section id="prediction" class="grid"></section>

      <section class="panel">
        <h2>Автопроверка результатов</h2>
        <button id="auto-check" type="button">Проверить сейчас</button>
        <p id="review" class="muted">Прогнозы с найденной датой попадут в очередь. Сервер сам проверяет результаты примерно раз в час.</p>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
